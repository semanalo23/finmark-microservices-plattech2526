<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMark Corporation - Home</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            padding: 40px;
            width: 500px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            text-align: center;
        }
        h2 {
            font-size: 26px;
            color: #1a202c;
            margin-bottom: 16px;
        }
        p {
            font-size: 14px;
            color: #4a5568;
            margin-bottom: 24px;
        }
        .btn {
            padding: 12px 20px;
            background: linear-gradient(135deg,#5a81bf,#4a72b2);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(74,114,178,0.35);
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Welcome to FinMark Corporation</h2>
    <p>You are now authenticated. This is a placeholder Home page until the Dashboard microservice is connected.</p>
    <a href="/login" class="btn">Logout</a>
</div>
</body>
</html>c
