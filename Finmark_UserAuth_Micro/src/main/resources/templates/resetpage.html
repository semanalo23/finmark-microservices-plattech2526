<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinMark Corporation - Reset Password</title>
    <style>
        body { margin:0; padding:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:url('https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat; height:100vh; display:flex; justify-content:center; align-items:center; }
        .card { background:rgba(255,255,255,0.85); backdrop-filter:blur(12px); padding:40px; width:400px; border-radius:24px; box-shadow:0 20px 40px rgba(0,0,0,0.06); text-align:center; }
        h2 { font-size:24px; color:#1a202c; margin-bottom:24px; }
        .form-group { text-align:left; margin-bottom:20px; }
        label { font-size:11px; font-weight:700; color:#4a5568; text-transform:uppercase; margin-bottom:6px; display:block; }
        input { width:100%; padding:12px 16px; border:1px solid #e2e8f0; border-radius:10px; font-size:14px; }
        .btn { width:100%; padding:14px; background:linear-gradient(135deg,#5a81bf,#4a72b2); color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; }
        .btn:hover { transform:translateY(-1px); box-shadow:0 6px 16px rgba(74,114,178,0.35); }
    </style>
</head>
<body>
<div class="card">
    <h2>Reset Your Password</h2>

    <!-- Feedback banners -->
    <div data-th-if="${param.error}" class="error-banner">
        User not found. Please check your email.
    </div>
    <div data-th-if="${param.success}" class="success-banner">
        Password updated successfully. Please sign in.
    </div>

    <form data-th-action="@{/reset}" method="post">
        <div class="form-group">
            <label for="username">Email Address</label>
            <input type="text" id="username" name="username" placeholder="name@company.com" required>
        </div>
        <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" name="newPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn">Reset Password →</button>
    </form>
    <p style="margin-top:20px;font-size:13px;color:#718096;">Remembered your password? <a data-th-href="@{/login}" style="color:#4a72b2;text-decoration:none;">Sign in</a></p>
</div>
</body>
</html>
