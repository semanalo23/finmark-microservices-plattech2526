# Server settings
server.port=8082
spring.application.name=Finmark_ProdDashboardCatalog_Micro

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:finmarkdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Enable H2 console (optional, for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Session store disabled (no Redis/JDBC)
spring.session.store-type=none

# Temporary test user for dashboard navigation
spring.security.user.name=testuser
spring.security.user.password=password123
spring.security.user.roles=USER